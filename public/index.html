<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music App - Audio Engine</title>
    <link rel="stylesheet" href="/css/themes/midnight-conservatory.css">
    <link rel="stylesheet" href="/css/style.css">
</head>
<body class="mc-theme">
    <div class="container">
        <h1>Audio Engine Demo</h1>

        <div class="audio-controls">
            <div class="device-selector">
                <label for="audio-device">Audio Input Device:</label>
                <select id="audio-device">
                    <option value="">Select a device...</option>
                </select>
            </div>

            <div class="control-buttons">
                <button id="start-btn" class="btn btn-primary">Start Microphone</button>
                <button id="stop-btn" class="btn btn-secondary" disabled>Stop Microphone</button>
            </div>

            <div class="gain-control">
                <label for="gain-slider">Gain:</label>
                <input type="range" id="gain-slider" min="0" max="2" step="0.1" value="1">
                <span id="gain-value">1.0</span>
            </div>
        </div>

        <div class="level-meter">
            <label>Audio Level:</label>
            <div class="meter-bar">
                <div id="level-indicator" class="meter-fill"></div>
            </div>
            <span id="level-value">-60 dB</span>
        </div>

        <div class="visualization">
            <h2>Waveform</h2>
            <canvas id="waveform-canvas" width="800" height="200"></canvas>
        </div>

        <div class="status-panel">
            <div id="status-message" class="status-message">Click "Start Microphone" to begin</div>
            <div id="error-message" class="error-message"></div>
        </div>
    </div>

    <script src="/js/audio/audio-engine.js"></script>
    <script src="/js/audio-demo.js"></script>
</body>
</html>
