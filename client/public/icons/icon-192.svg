<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <rect width="192" height="192" rx="24" fill="#0a0a12"/>
  <!-- Violin f-hole stylized as app icon -->
  <g transform="translate(96,96)">
    <!-- Outer amber ring -->
    <circle cx="0" cy="0" r="72" fill="none" stroke="#c9a227" stroke-width="4"/>
    <!-- Stylized f-hole left -->
    <path d="M-12,-40 C-12,-28 -20,-16 -20,0 C-20,16 -12,28 -12,40" fill="none" stroke="#f3f4f6" stroke-width="4" stroke-linecap="round"/>
    <circle cx="-12" cy="-32" r="3" fill="#f3f4f6"/>
    <circle cx="-12" cy="32" r="3" fill="#f3f4f6"/>
    <!-- Stylized f-hole right -->
    <path d="M12,-40 C12,-28 20,-16 20,0 C20,16 12,28 12,40" fill="none" stroke="#f3f4f6" stroke-width="4" stroke-linecap="round"/>
    <circle cx="12" cy="-32" r="3" fill="#f3f4f6"/>
    <circle cx="12" cy="32" r="3" fill="#f3f4f6"/>
    <!-- Bridge line -->
    <line x1="-24" y1="0" x2="24" y2="0" stroke="#c9a227" stroke-width="2"/>
  </g>
</svg>
